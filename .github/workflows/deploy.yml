name: Deploy FastAPI

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          cat >> ~/.ssh/config << EOF
          Host bastion
            HostName 210.109.15.10
            User ubuntu
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no

          Host fastapi
            HostName <FastAPI VM 내부 IP>
            User ubuntu
            IdentityFile ~/.ssh/id_rsa
            ProxyJump bastion
            StrictHostKeyChecking no
          EOF

      - name: Deploy
        run: |
          ssh fastapi << 'ENDSSH'
            set -e
            cd ~/fastapi/utopia-fastapi-main

            git pull origin main

            cat > .env << 'EOF'
          ${{ secrets.ENV_FILE }}
          EOF

            source venv/bin/activate
            pip install -r requirements.txt

            pkill -f "uvicorn main:app" || true
            sleep 2

            nohup uvicorn main:app \
              --host 0.0.0.0 \
              --port 8000 \
              >> ~/fastapi/utopia-fastapi-main/server.log 2>&1 &

            echo "✅ 배포 완료 $(date)"
          ENDSSH
